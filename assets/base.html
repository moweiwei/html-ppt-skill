<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[必填] 替换为 PPT 标题 · Deck Title</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;700&family=Press+Start+2P&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style id="theme-style">
/* AI: Paste selected CSS theme here */
</style>
<style>
/* ===== Shared Base Styles ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; width: 100vw; height: 100vh; }

.deck {
  display: flex;
  width: max-content;
  height: 100vh;
  transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* ===== Slide Layouts ===== */
.slide {
  width: 100vw;
  height: 100vh;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 80px;
  position: relative;
  overflow: hidden;
}

.slide-hero {
  align-items: center;
  text-align: center;
}

.slide-split {
  flex-direction: row;
  align-items: stretch;
}

.slide-split > * {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.slide-split > * + * {
  padding-left: 48px;
}

.slide-grid {
  display: grid;
  gap: 24px;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
}

.slide-cards {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}

.slide img {
  max-width: 100%;
  height: auto;
  object-fit: contain;
}

/* ===== Navigation Hints ===== */
.nav-hint {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  opacity: 0.4;
  pointer-events: none;
}

.slide-number {
  position: fixed;
  bottom: 20px;
  right: 80px;
  font-size: 12px;
  opacity: 0.4;
}

/* ===== Index Overlay ===== */
.index-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.9);
  z-index: 1000;
  display: none;
  overflow-y: auto;
  padding: 40px;
}

.index-overlay.active {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

.index-overlay .index-thumb {
  aspect-ratio: 16/9;
  border: 2px solid rgba(255, 255, 255, 0.2);
  border-radius: 4px;
  cursor: pointer;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  padding: 12px;
  color: rgba(255, 255, 255, 0.8);
}

.index-overlay .index-thumb:hover {
  border-color: rgba(255, 255, 255, 0.6);
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .slide { padding: 24px 32px; }
  .slide-split { flex-direction: column; }
  .slide-split > * + * { padding-left: 0; padding-top: 24px; }
  .slide-number { right: 32px; }
}
</style>
</head>
<body>

<div class="deck">
  <!-- SLIDES_HERE -->
</div>

<!-- Index Overlay -->
<div class="index-overlay" id="indexOverlay"></div>

<!-- Navigation Hint -->
<div class="nav-hint">← → 键 / 滑动翻页 · ESC 索引</div>
<div class="slide-number" id="slideNumber">1 / 1</div>

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

<script>
(function () {
  'use strict';

  const deck = document.querySelector('.deck');
  const slides = document.querySelectorAll('.slide');
  const slideNumber = document.getElementById('slideNumber');
  const indexOverlay = document.getElementById('indexOverlay');
  let current = 0;
  let isAnimating = false;
  let indexOpen = false;

  // Initialize Lucide icons
  if (typeof lucide !== 'undefined') {
    lucide.createIcons();
  }

  // ===== Navigation =====
  function goTo(i) {
    if (isAnimating || i < 0 || i >= slides.length || i === current) return;
    isAnimating = true;
    current = i;

    deck.style.transform = `translateX(-${current * 100}vw)`;
    slideNumber.textContent = `${current + 1} / ${slides.length}`;

    // GSAP entrance animation
    gsap.fromTo(
      slides[current].children,
      { opacity: 0, y: 30 },
      {
        opacity: 1,
        y: 0,
        duration: 0.6,
        stagger: 0.1,
        ease: 'power2.out',
        onComplete: function () {
          isAnimating = false;
        }
      }
    );
  }

  // ===== Keyboard Navigation =====
  document.addEventListener('keydown', function (e) {
    if (indexOpen) {
      if (e.key === 'Escape') toggleIndex();
      return;
    }

    switch (e.key) {
      case 'ArrowRight':
      case 'ArrowDown':
      case ' ':
        e.preventDefault();
        goTo(current + 1);
        break;
      case 'ArrowLeft':
      case 'ArrowUp':
        e.preventDefault();
        goTo(current - 1);
        break;
      case 'Escape':
        toggleIndex();
        break;
      case 'Home':
        e.preventDefault();
        goTo(0);
        break;
      case 'End':
        e.preventDefault();
        goTo(slides.length - 1);
        break;
    }
  });

  // ===== Scroll Wheel (debounced) =====
  let wheelTimeout = null;
  document.addEventListener('wheel', function (e) {
    if (indexOpen) return;
    e.preventDefault();

    if (wheelTimeout) return;
    wheelTimeout = setTimeout(function () {
      wheelTimeout = null;
    }, 600);

    if (e.deltaY > 0) {
      goTo(current + 1);
    } else if (e.deltaY < 0) {
      goTo(current - 1);
    }
  }, { passive: false });

  // ===== Touch Swipe =====
  let touchStartX = 0;
  let touchStartY = 0;

  document.addEventListener('touchstart', function (e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', function (e) {
    if (indexOpen) return;

    const deltaX = e.changedTouches[0].clientX - touchStartX;
    const deltaY = e.changedTouches[0].clientY - touchStartY;

    // Require minimum swipe distance and ensure horizontal dominance
    if (Math.abs(deltaX) > 50 && Math.abs(deltaX) > Math.abs(deltaY)) {
      if (deltaX < 0) {
        goTo(current + 1);
      } else {
        goTo(current - 1);
      }
    }
  }, { passive: true });

  // ===== Index Overlay =====
  function toggleIndex() {
    indexOpen = !indexOpen;
    indexOverlay.classList.toggle('active', indexOpen);

    if (indexOpen) {
      buildIndex();
    }
  }

  function buildIndex() {
    indexOverlay.innerHTML = '';
    slides.forEach(function (slide, i) {
      const thumb = document.createElement('div');
      thumb.className = 'index-thumb';
      thumb.textContent = `Slide ${i + 1}`;

      // Try to extract title from first heading
      const heading = slide.querySelector('h1, h2, h3');
      if (heading) {
        thumb.textContent = heading.textContent;
      }

      thumb.addEventListener('click', function () {
        toggleIndex();
        goTo(i);
      });

      indexOverlay.appendChild(thumb);
    });
  }

  // ===== Initialization =====
  slideNumber.textContent = `1 / ${slides.length}`;

  // Initial entrance animation
  if (slides.length > 0) {
    gsap.fromTo(
      slides[0].children,
      { opacity: 0, y: 30 },
      {
        opacity: 1,
        y: 0,
        duration: 0.6,
        stagger: 0.1,
        ease: 'power2.out'
      }
    );
  }
})();
</script>

<!-- edit-mode.js will be injected here -->
<script src="assets/edit-mode.js"></script>
</body>
</html>
