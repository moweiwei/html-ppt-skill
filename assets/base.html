<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[必填] 替换为 PPT 标题 · Deck Title</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;700&family=Press+Start+2P&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style id="theme-style">
/* AI: Paste selected CSS theme here */
</style>
<style>
/* ===== Shared Base Styles ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; width: 100vw; height: 100vh; }

.deck {
  display: flex;
  width: max-content;
  height: 100vh;
  transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* ===== Slide Layouts ===== */
.slide {
  width: 100vw;
  height: 100vh;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 80px;
  position: relative;
  overflow: hidden;
}

.slide-hero {
  align-items: center;
  text-align: center;
}

.slide-split {
  flex-direction: row;
  align-items: stretch;
}

.slide-split > * {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.slide-split > * + * {
  padding-left: 48px;
}

.slide-grid {
  display: grid;
  gap: 24px;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
}

.slide-cards {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}

.slide img {
  max-width: 100%;
  height: auto;
  object-fit: contain;
}

/* ===== Navigation Hints ===== */
.nav-hint {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  opacity: 0.4;
  pointer-events: none;
}

.slide-number {
  position: fixed;
  bottom: 20px;
  right: 80px;
  font-size: 12px;
  opacity: 0.4;
}

/* ===== Index Overlay ===== */
.index-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.9);
  z-index: 1000;
  display: none;
  overflow-y: auto;
  padding: 40px;
}

.index-overlay.active {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

.index-overlay .index-thumb {
  aspect-ratio: 16/9;
  border: 2px solid rgba(255, 255, 255, 0.2);
  border-radius: 4px;
  cursor: pointer;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  padding: 12px;
  color: rgba(255, 255, 255, 0.8);
}

.index-overlay .index-thumb:hover {
  border-color: rgba(255, 255, 255, 0.6);
}

/* ===== Progress Bar ===== */
.progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  width: 0%;
  background: rgba(255, 255, 255, 0.7);
  z-index: 999;
  transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  pointer-events: none;
}

/* ===== Fullscreen Button ===== */
.fullscreen-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 32px;
  height: 32px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.4;
  transition: opacity 0.2s, background 0.2s;
  z-index: 100;
}

.fullscreen-btn:hover {
  opacity: 0.9;
  background: rgba(255, 255, 255, 0.15);
}

.fullscreen-btn svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ===== Mobile Touch Hint ===== */
.touch-hint {
  display: none;
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  opacity: 0.35;
  pointer-events: none;
  text-align: center;
  white-space: nowrap;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .slide { padding: 24px 32px; }
  .slide-split { flex-direction: column; }
  .slide-split > * + * { padding-left: 0; padding-top: 24px; }
  .slide-number { right: 32px; }
  .touch-hint { display: block; }
  .fullscreen-btn { bottom: 16px; left: 16px; }
}
</style>
</head>
<body>

<!-- Progress Bar -->
<div class="progress-bar" id="progressBar"></div>

<div class="deck">
  <!-- SLIDES_HERE -->
</div>

<!-- Index Overlay -->
<div class="index-overlay" id="indexOverlay"></div>

<!-- Fullscreen Toggle -->
<button class="fullscreen-btn" id="fullscreenBtn" title="Toggle fullscreen">
  <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
</button>

<!-- Navigation Hint -->
<div class="nav-hint">← → 键 / 滑动翻页 · ESC 索引</div>
<div class="touch-hint">← 左右滑动翻页 →</div>
<div class="slide-number" id="slideNumber">1 / 1</div>

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

<script>
(function () {
  'use strict';

  const deck = document.querySelector('.deck');
  const slides = document.querySelectorAll('.slide');
  const slideNumber = document.getElementById('slideNumber');
  const indexOverlay = document.getElementById('indexOverlay');
  const progressBar = document.getElementById('progressBar');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  let current = 0;
  let isAnimating = false;
  let indexOpen = false;

  // Initialize Lucide icons
  if (typeof lucide !== 'undefined') {
    lucide.createIcons();
  }

  // ===== Navigation =====
  function goTo(i) {
    if (isAnimating || i < 0 || i >= slides.length || i === current) return;
    isAnimating = true;
    current = i;

    deck.style.transform = `translateX(-${current * 100}vw)`;
    slideNumber.textContent = `${current + 1} / ${slides.length}`;

    // Update progress bar
    if (progressBar) {
      const pct = slides.length > 1 ? (current / (slides.length - 1)) * 100 : 0;
      progressBar.style.width = pct + '%';
    }

    // GSAP entrance animation
    gsap.fromTo(
      slides[current].children,
      { opacity: 0, y: 30 },
      {
        opacity: 1,
        y: 0,
        duration: 0.6,
        stagger: 0.1,
        ease: 'power2.out',
        onComplete: function () {
          isAnimating = false;
        }
      }
    );
  }

  // ===== Keyboard Navigation =====
  document.addEventListener('keydown', function (e) {
    if (indexOpen) {
      if (e.key === 'Escape') toggleIndex();
      return;
    }

    switch (e.key) {
      case 'ArrowRight':
      case 'ArrowDown':
      case ' ':
        e.preventDefault();
        goTo(current + 1);
        break;
      case 'ArrowLeft':
      case 'ArrowUp':
        e.preventDefault();
        goTo(current - 1);
        break;
      case 'Escape':
        toggleIndex();
        break;
      case 'Home':
        e.preventDefault();
        goTo(0);
        break;
      case 'End':
        e.preventDefault();
        goTo(slides.length - 1);
        break;
    }
  });

  // ===== Scroll Wheel (debounced) =====
  let wheelTimeout = null;
  document.addEventListener('wheel', function (e) {
    if (indexOpen) return;
    e.preventDefault();

    if (wheelTimeout) return;
    wheelTimeout = setTimeout(function () {
      wheelTimeout = null;
    }, 600);

    if (e.deltaY > 0) {
      goTo(current + 1);
    } else if (e.deltaY < 0) {
      goTo(current - 1);
    }
  }, { passive: false });

  // ===== Touch Swipe =====
  let touchStartX = 0;
  let touchStartY = 0;

  document.addEventListener('touchstart', function (e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', function (e) {
    if (indexOpen) return;

    const deltaX = e.changedTouches[0].clientX - touchStartX;
    const deltaY = e.changedTouches[0].clientY - touchStartY;

    // Require minimum swipe distance and ensure horizontal dominance
    if (Math.abs(deltaX) > 50 && Math.abs(deltaX) > Math.abs(deltaY)) {
      if (deltaX < 0) {
        goTo(current + 1);
      } else {
        goTo(current - 1);
      }
    }
  }, { passive: true });

  // ===== Index Overlay =====
  function toggleIndex() {
    indexOpen = !indexOpen;
    indexOverlay.classList.toggle('active', indexOpen);

    if (indexOpen) {
      buildIndex();
    }
  }

  function getSlideTitle(slide, index) {
    // Priority: data attribute > heading > first bold/strong > first non-empty text
    if (slide.dataset.title) return slide.dataset.title;

    var heading = slide.querySelector('h1, h2, h3, h4');
    if (heading && heading.textContent.trim()) return heading.textContent.trim();

    var strong = slide.querySelector('strong, b');
    if (strong && strong.textContent.trim()) return strong.textContent.trim();

    // Walk text nodes for first meaningful line
    var walker = document.createTreeWalker(slide, NodeFilter.SHOW_TEXT, null, false);
    while (walker.nextNode()) {
      var text = walker.currentNode.textContent.trim();
      if (text.length > 2 && text.length < 80) return text;
    }

    return 'Slide ' + (index + 1);
  }

  function buildIndex() {
    indexOverlay.innerHTML = '';
    slides.forEach(function (slide, i) {
      var thumb = document.createElement('div');
      thumb.className = 'index-thumb';
      thumb.textContent = getSlideTitle(slide, i);

      thumb.addEventListener('click', function () {
        toggleIndex();
        goTo(i);
      });

      indexOverlay.appendChild(thumb);
    });
  }

  // ===== Fullscreen Toggle =====
  if (fullscreenBtn) {
    fullscreenBtn.addEventListener('click', function () {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(function () {});
      } else {
        document.exitFullscreen().catch(function () {});
      }
    });
  }

  // ===== Initialization =====
  slideNumber.textContent = `1 / ${slides.length}`;

  // Initial entrance animation
  if (slides.length > 0) {
    gsap.fromTo(
      slides[0].children,
      { opacity: 0, y: 30 },
      {
        opacity: 1,
        y: 0,
        duration: 0.6,
        stagger: 0.1,
        ease: 'power2.out'
      }
    );
  }
})();
</script>

<!-- edit-mode.js: load only if the file exists -->
<script>
(function () {
  var s = document.createElement('script');
  s.src = 'assets/edit-mode.js';
  s.onerror = function () { this.remove(); };
  document.body.appendChild(s);
})();
</script>
</body>
</html>
